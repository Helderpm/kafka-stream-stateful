spring:
  application:
    name: fraud-detection-demo
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.javatechie.serdes.TransactionSerializer
    streams:
      application-id: ${SPRING_KAFKA_STREAMS_APPLICATION_ID:fraud-detection-streams}
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: com.javatechie.serdes.TransactionSerde
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
        default.production.exception.handler: org.apache.kafka.streams.errors.DefaultProductionExceptionHandler
        processing.guarantee: exactly_once
        commit.interval.ms: 1000
      state-dir: /tmp/kafka-stream-logs

# Management endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.javatechie: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
